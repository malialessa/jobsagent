<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amália - Agente de Empregos IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; /* slate-100 */
        }
        .main-header {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .card { 
            transition: all 0.3s ease; 
            border: 1px solid #e2e8f0; /* slate-200 */
            position: relative;
            overflow: hidden;
        }
        .card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            border-color: #c7d2fe; /* indigo-200 */
        }
        .fit-score-ring {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 50px;
            height: 50px;
        }
        .fit-score-ring svg {
            transform: rotate(-90deg);
        }
        .fit-score-ring circle {
            transition: stroke-dashoffset 0.5s ease;
        }
        .fit-score-text {
            position: absolute;
            font-weight: 800;
            color: #374151; /* gray-700 */
        }
        
        .modal { z-index: 990; }
        .modal-overlay { z-index: 999; }
        .modal-container { z-index: 1000; } 

        .tooltip { position: relative; }
        .tooltip .tooltip-text {
            visibility: hidden; background-color: #1f2937; color: #fff; text-align: center;
            border-radius: 6px; padding: 5px 10px; position: absolute; z-index: 1;
            bottom: 125%; left: 50%; transform: translateX(-50%); white-space: nowrap;
            font-size: 12px; opacity: 0; transition: opacity 0.3s;
        }
        .tooltip:hover .tooltip-text { visibility: visible; opacity: 1; }

        /* --- ESTILOS DE STATUS ATUALIZADOS --- */
        .status-badge {
            position: absolute;
            top: 12px;
            right: -40px;
            transform: rotate(45deg);
            padding: 4px 40px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .status-aplicada .status-badge { background-color: #16a34a; } /* green-600 */
        .status-descartada { opacity: 0.65; }
        .status-descartada .status-badge { background-color: #64748b; } /* slate-500 */
        .status-descartada:hover { opacity: 1; }
        
        .action-button {
            background-color: #f1f5f9; /* slate-100 */
            border-radius: 9999px;
            width: 2.5rem; /* 40px */
            height: 2.5rem; /* 40px */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #64748b; /* slate-500 */
            transition: all 0.2s ease-in-out;
        }
        .action-button:hover {
            transform: scale(1.1);
            color: #1e293b; /* slate-800 */
        }
    </style>
</head>
<body class="p-4 sm:p-8">
    <div class="container mx-auto max-w-7xl">
        <header class="main-header sticky top-4 z-50 flex flex-col md:flex-row items-center justify-between mb-12 p-4 rounded-2xl shadow-lg">
            <div class="flex items-center mb-4 md:mb-0">
                <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mr-4">
                    <i class="fas fa-robot text-4xl text-indigo-600"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Agente de Empregos IA</h1>
                    <p class="text-slate-500">Sua central de candidaturas inteligentes.</p>
                </div>
            </div>
            <div class="flex flex-col sm:flex-row gap-3">
                <button id="open-settings-button" class="bg-white hover:bg-slate-50 text-slate-600 font-bold py-3 px-6 rounded-full shadow-md border border-slate-200 transition duration-300 transform hover:scale-105">
                    <i class="fas fa-cog mr-2"></i> Configurações
                </button>
                <button id="run-agent-button" class="bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 hover:to-violet-700 text-white font-bold py-3 px-6 rounded-full shadow-lg transition duration-300 transform hover:scale-105">
                    <i class="fas fa-play mr-2"></i> Rodar Agente
                </button>
            </div>
        </header>

        <div class="flex flex-col sm:flex-row items-center justify-end gap-4 mb-8">
            <span class="text-sm text-slate-700 font-semibold">Ordenar por:</span>
            <div class="flex gap-2">
                <button id="sort-fit-button" class="bg-white border border-slate-300 text-slate-700 font-bold py-2 px-4 rounded-full text-sm transition duration-300 hover:bg-slate-100">
                    Fit <i class="fas fa-sort-amount-down-alt ml-1"></i>
                </button>
                <button id="sort-date-button" class="bg-white border border-slate-300 text-slate-700 font-bold py-2 px-4 rounded-full text-sm transition duration-300 hover:bg-slate-100">
                    Data <i class="fas fa-sort-numeric-down-alt ml-1"></i>
                </button>
            </div>
        </div>

        <div id="job-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Vagas serão renderizadas aqui -->
        </div>
    </div>

    <!-- Modal de Configuração -->
    <div id="settings-modal" class="modal fixed inset-0 hidden overflow-y-auto">
        <div id="settings-modal-overlay" class="modal-overlay fixed inset-0 bg-gray-900 bg-opacity-75 transition-opacity"></div>
        <div class="modal-container fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white p-6 md:p-8 rounded-xl shadow-2xl max-h-[90vh] overflow-y-auto w-11/12 md:w-3/4 lg:w-1/2">
            <div class="modal-header flex justify-between items-center pb-4 border-b border-gray-200">
                <h3 class="text-2xl font-bold text-gray-800">Configurações do Agente</h3>
                <button id="close-modal-button" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="modal-body mt-4">
                <form id="settings-form">
                    <div class="mb-6">
                        <label for="profile-input" class="block text-gray-700 text-sm font-bold mb-2">Seu Perfil Profissional</label>
                        <textarea id="profile-input" name="profile" rows="8" class="shadow-sm appearance-none border rounded-lg w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"></textarea>
                    </div>
                    <div class="mb-6">
                        <label for="job-sites-input" class="block text-gray-700 text-sm font-bold mb-2">Sites de Vaga e Palavras-chave</label>
                        <textarea id="job-sites-input" name="job_sites" rows="6" class="shadow-sm appearance-none border rounded-lg w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"></textarea>
                    </div>
                    <div class="mb-6 flex flex-col md:flex-row gap-4">
                        <div class="md:w-1/2">
                            <label for="email-input" class="block text-gray-700 text-sm font-bold mb-2">Email de Notificação</label>
                            <input type="email" id="email-input" name="notif_email" class="shadow-sm appearance-none border rounded-lg w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        </div>
                        <div class="md:w-1/2">
                            <label for="min-score-input" class="block text-gray-700 text-sm font-bold mb-2">Score Mínimo (1-10)</label>
                            <input type="number" id="min-score-input" name="min_fit_score" min="1" max="10" class="shadow-sm appearance-none border rounded-lg w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        </div>
                    </div>
                    <div class="flex items-center justify-end mt-8">
                        <button type="button" id="save-settings-button" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-6 rounded-full transition duration-300 transform hover:scale-105">
                            <i class="fas fa-save mr-2"></i> Salvar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKEdwGJFjAXyY3vQUMm0sCIvdSfs-WInw",
            authDomain: "arquitetodadivulgacao.firebaseapp.com",
            projectId: "arquitetodadivulgacao",
            storageBucket: "arquitetodadivulgacao.appspot.com",
            messagingSenderId: "760851989407",
            appId: "1:760851989407:web:76dbd699f18da6969473aa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const jobsCollection = collection(db, "jobapplications");
        const settingsDoc = doc(db, "user_settings", "config");
        const jobList = document.getElementById('job-list');
        const runButton = document.getElementById('run-agent-button');
        const openSettingsButton = document.getElementById('open-settings-button');
        const settingsModal = document.getElementById('settings-modal');
        const closeModalButton = document.getElementById('close-modal-button');
        const saveSettingsButton = document.getElementById('save-settings-button');
        const sortFitButton = document.getElementById('sort-fit-button');
        const sortDateButton = document.getElementById('sort-date-button');
        
        const CLOUD_FUNCTION_URL = "https://jobagent-760851989407.us-central1.run.app";
        let currentJobs = [];
        let sortOrder = 'desc';

        window.updateJobStatus = async (id, newStatus) => {
            const jobDocRef = doc(db, "jobapplications", id);
            try {
                await updateDoc(jobDocRef, { status: newStatus });
            } catch (error) {
                console.error("Erro ao atualizar status: ", error);
            }
        };

        function getFitColor(score) {
            if (score >= 9) return '#22c55e'; // green-500
            if (score >= 8) return '#f97316'; // orange-500
            if (score >= 7) return '#f59e0b'; // amber-500
            return '#ef4444'; // red-500
        }

        function sortJobs(sortBy) {
            if (sortBy === 'fit') {
                currentJobs.sort((a, b) => sortOrder === 'desc' ? b.fit_score - a.fit_score : a.fit_score - b.fit_score);
            } else if (sortBy === 'date') {
                currentJobs.sort((a, b) => sortOrder === 'desc' ? b.timestamp.seconds - a.timestamp.seconds : a.timestamp.seconds - b.timestamp.seconds);
            }
            sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
            renderJobs(currentJobs);
        }

        function renderJobs(jobs) {
            jobList.innerHTML = '';
            if (jobs.length === 0) {
                jobList.innerHTML = `
                    <div class="col-span-full text-center bg-white rounded-2xl p-12 border border-slate-200">
                        <i class="fas fa-wind text-5xl text-slate-400 mb-4"></i>
                        <h3 class="text-xl font-bold text-slate-700">Nenhuma vaga por aqui... ainda.</h3>
                        <p class="text-slate-500 mt-2">Clique em "Rodar Agente" para iniciar uma nova busca por oportunidades.</p>
                    </div>`;
                return;
            }
            jobs.forEach(job => {
                const fitColor = getFitColor(job.fit_score);
                const circumference = 2 * Math.PI * 20; // 2 * pi * radius
                const dashoffset = circumference - (job.fit_score / 10) * circumference;

                const formattedDate = job.timestamp ? new Date(job.timestamp.seconds * 1000).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' }) : 'N/A';
                
                const statusText = job.status === 'aplicada' ? 'Aplicada' : (job.status === 'descartada' ? 'Descartada' : '');

                const card = `
                    <div class="card bg-white rounded-2xl flex flex-col justify-between status-${job.status || 'pendente'}">
                        ${statusText ? `<div class="status-badge">${statusText}</div>` : ''}
                        <div class="p-6">
                            <div class="flex items-start justify-between mb-4">
                                <div>
                                    <p class="text-sm font-semibold text-indigo-600">${job.company}</p>
                                    <h2 class="text-xl font-bold text-slate-800 mt-1">${job.job_title}</h2>
                                </div>
                                <div class="fit-score-ring tooltip">
                                    <svg width="50" height="50" class="transform -rotate-90">
                                        <circle class="text-slate-200" stroke-width="5" stroke="currentColor" fill="transparent" r="20" cx="25" cy="25"/>
                                        <circle style="stroke: ${fitColor}; stroke-dasharray: ${circumference}; stroke-dashoffset: ${dashoffset};"
                                            stroke-width="5" stroke-linecap="round" stroke="currentColor" fill="transparent" r="20" cx="25" cy="25"/>
                                    </svg>
                                    <span class="fit-score-text text-lg">${job.fit_score}</span>
                                    <span class="tooltip-text">Fit com seu perfil: ${job.fit_score}/10</span>
                                </div>
                            </div>
                            <p class="text-slate-600 text-sm mb-5 border-l-4 border-slate-200 pl-4">
                                ${job.resume_summary || 'Resumo da IA não disponível.'}
                            </p>
                            <div class="flex items-center justify-between text-xs text-slate-500">
                                <span class="flex items-center gap-2"><i class="fas fa-calendar-alt"></i> ${formattedDate}</span>
                                <span class="flex items-center gap-2"><i class="fas fa-dollar-sign"></i> ${job.salary_range || 'Não informado'}</span>
                            </div>
                        </div>
                        <div class="bg-slate-50 p-4 flex items-center justify-between border-t border-slate-200">
                             <div class="flex items-center gap-2">
                                <button title="Marcar como Aplicada" class="action-button hover:bg-green-100" onclick="window.updateJobStatus('${job.id}', 'aplicada')"><i class="fas fa-check text-green-600"></i></button>
                                <button title="Descartar Vaga" class="action-button hover:bg-red-100" onclick="window.updateJobStatus('${job.id}', 'descartada')"><i class="fas fa-trash text-red-600"></i></button>
                                <button title="Resetar Status" class="action-button hover:bg-yellow-100" onclick="window.updateJobStatus('${job.id}', 'pendente')"><i class="fas fa-undo text-yellow-600"></i></button>
                            </div>
                            <div class="flex gap-4">
                                <a href="${job.job_link}" target="_blank" class="font-bold text-indigo-600 hover:text-indigo-800 text-sm">Ver Vaga <i class="fas fa-external-link-alt ml-1 text-xs"></i></a>
                                ${job.resume_url ? `<a href="${job.resume_url}" target="_blank" class="font-bold text-slate-600 hover:text-slate-800 text-sm">Ver CV <i class="fas fa-file-arrow-down ml-1 text-xs"></i></a>` : ''}
                            </div>
                        </div>
                    </div>
                `;
                jobList.innerHTML += card;
            });
        }
        
        const q = query(jobsCollection, orderBy("timestamp", "desc"));
        onSnapshot(q, (querySnapshot) => {
            const jobs = [];
            querySnapshot.forEach((doc) => {
                jobs.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
            currentJobs = jobs;
            renderJobs(currentJobs);
        });

        const profileInput = document.getElementById('profile-input');
        const jobSitesInput = document.getElementById('job-sites-input');
        const emailInput = document.getElementById('email-input');
        const minScoreInput = document.getElementById('min-score-input');
        
        async function loadSettings() {
            try {
                const docSnap = await getDoc(settingsDoc);
                if (docSnap.exists()) {
                    const settings = docSnap.data();
                    if (profileInput) profileInput.value = settings.profile || '';
                    if (jobSitesInput) jobSitesInput.value = JSON.stringify(settings.job_sites, null, 2) || '[]';
                    if (emailInput) emailInput.value = settings.notif_email || '';
                    if (minScoreInput) minScoreInput.value = settings.min_fit_score || 8;
                }
            } catch (error) {
                console.error("Erro ao carregar configurações:", error);
            }
        }

        saveSettingsButton.addEventListener('click', async () => {
            saveSettingsButton.disabled = true;
            try {
                const settingsToSave = {
                    profile: profileInput.value,
                    job_sites: JSON.parse(jobSitesInput.value),
                    notif_email: emailInput.value,
                    min_fit_score: parseInt(minScoreInput.value)
                };
                await setDoc(settingsDoc, settingsToSave);
                alert("Configurações salvas com sucesso!");
                settingsModal.classList.add('hidden');
            } catch (error) {
                alert("Erro ao salvar: " + error.message);
            } finally {
                saveSettingsButton.disabled = false;
            }
        });

        runButton.addEventListener('click', async () => {
            runButton.disabled = true;
            runButton.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Rodando...';
            try {
                const response = await fetch(CLOUD_FUNCTION_URL, { method: 'POST' });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                console.log('Agente executado com sucesso');
            } catch (error) {
                console.error('Erro ao rodar o agente:', error);
                alert('Ocorreu um erro ao rodar o agente.');
            } finally {
                runButton.disabled = false;
                runButton.innerHTML = '<i class="fas fa-play mr-2"></i> Rodar Agente';
            }
        });

        openSettingsButton.addEventListener('click', () => {
            loadSettings();
            settingsModal.classList.remove('hidden');
        });
        closeModalButton.addEventListener('click', () => {
            settingsModal.classList.add('hidden');
        });

        if (sortFitButton) sortFitButton.addEventListener('click', () => sortJobs('fit'));
        if (sortDateButton) sortDateButton.addEventListener('click', () => sortJobs('date'));
    </script>
</body>
</html>
