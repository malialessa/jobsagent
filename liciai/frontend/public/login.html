<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetiva | Entrar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="min-h-screen grid lg:grid-cols-2">
    <section class="hidden lg:flex items-center justify-center p-10 border-r border-white/10 bg-[radial-gradient(700px_320px_at_0%_0%,rgba(228,164,20,.15),transparent_60%),radial-gradient(700px_320px_at_100%_0%,rgba(106,1,187,.14),transparent_60%),#0E0F11]">
      <div class="max-w-xl">
        <p class="text-xs uppercase tracking-widest text-slate-400">Efetiva</p>
        <h1 class="mt-3 text-5xl font-extrabold leading-tight">Volte para o controle da sua operação comercial.</h1>
        <p class="mt-4 text-slate-300">Acompanhe oportunidades, prazos e propostas com visão clara do que realmente importa.</p>
      </div>
    </section>

    <section class="flex items-center justify-center p-6">
      <div class="w-full max-w-md rounded-2xl border border-white/10 bg-white/5 p-6 sm:p-8">
        <div class="flex items-center justify-between">
          <h2 class="text-2xl font-bold">Entrar</h2>
          <a href="/" class="text-sm text-slate-300 hover:text-white">Voltar</a>
        </div>

        <form id="login-form" class="mt-6 space-y-4">
          <div>
            <label for="email" class="block text-sm text-slate-300">Email</label>
            <input id="email" type="email" required autocomplete="username" class="mt-1 w-full rounded-lg border border-white/15 bg-black/20 px-3 py-2.5 text-slate-100 focus:outline-none focus:ring-2 focus:ring-yellow-500" />
          </div>
          <div>
            <div class="flex items-center justify-between">
              <label for="password" class="block text-sm text-slate-300">Senha</label>
              <button id="forgot-btn" type="button" class="text-xs text-yellow-300 hover:text-yellow-200">Esqueci minha senha</button>
            </div>
            <input id="password" type="password" required autocomplete="current-password" class="mt-1 w-full rounded-lg border border-white/15 bg-black/20 px-3 py-2.5 text-slate-100 focus:outline-none focus:ring-2 focus:ring-yellow-500" />
          </div>
          <button type="submit" class="w-full rounded-lg px-4 py-2.5 font-bold text-black bg-yellow-500 hover:bg-yellow-400">Entrar</button>
        </form>

        <div class="mt-6">
          <div class="relative">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
            <div class="relative text-center text-xs text-slate-400"><span class="bg-slate-950 px-2">ou</span></div>
          </div>
          <button id="google-btn" class="mt-4 w-full rounded-lg border border-white/15 bg-white/5 px-4 py-2.5 font-semibold hover:bg-white/10">Continuar com Google</button>
        </div>

        <p id="success" class="mt-4 text-sm text-emerald-300"></p>
        <p id="error" class="mt-2 text-sm text-red-300"></p>

        <p class="mt-6 text-sm text-slate-300">Ainda não tem conta? <a href="/cadastro.html" class="text-yellow-300 hover:text-yellow-200 font-semibold">Criar conta</a></p>
      </div>
    </section>
  </main>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDqRoRHQU-3XwUmNrV5MwVW6o_PwbxywVA",
      authDomain: "uniquex-487718.firebaseapp.com",
      projectId: "uniquex-487718",
      storageBucket: "uniquex-487718.firebasestorage.app",
      messagingSenderId: "1050359786854",
      appId: "1:1050359786854:web:6b9c09acbbd637ed5a6ca7"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    const loginForm = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const googleBtn = document.getElementById('google-btn');
    const forgotBtn = document.getElementById('forgot-btn');
    const successEl = document.getElementById('success');
    const errorEl = document.getElementById('error');

    function clearMessages() { successEl.textContent = ''; errorEl.textContent = ''; }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();
      try {
        await auth.signInWithEmailAndPassword(emailInput.value.trim(), passwordInput.value);
        window.location.href = '/radar';
      } catch (error) {
        errorEl.textContent = error.message || 'Falha ao entrar.';
      }
    });

    googleBtn.addEventListener('click', async () => {
      clearMessages();
      try {
        await auth.signInWithPopup(provider);
        window.location.href = '/radar';
      } catch (error) {
        errorEl.textContent = error.message || 'Falha no login com Google.';
      }
    });

    forgotBtn.addEventListener('click', async () => {
      clearMessages();
      const email = emailInput.value.trim();
      if (!email) {
        errorEl.textContent = 'Informe seu email para recuperação de senha.';
        return;
      }
      try {
        await auth.sendPasswordResetEmail(email);
        successEl.textContent = 'Email de recuperação enviado com sucesso.';
      } catch (error) {
        errorEl.textContent = error.message || 'Falha ao enviar recuperação.';
      }
    });

    auth.onAuthStateChanged((user) => {
      if (user) {
        window.location.href = '/radar';
      }
    });
  </script>
</body>
</html>
