<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Efetiva | Criar conta</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="min-h-screen grid lg:grid-cols-2">
    <section class="hidden lg:flex items-center justify-center p-10 border-r border-white/10 bg-[radial-gradient(700px_320px_at_0%_0%,rgba(228,164,20,.15),transparent_60%),radial-gradient(700px_320px_at_100%_0%,rgba(106,1,187,.14),transparent_60%),#0E0F11]">
      <div class="max-w-xl">
        <p class="text-xs uppercase tracking-widest text-slate-400">Efetiva</p>
        <h1 class="mt-3 text-5xl font-extrabold leading-tight">Comece seu trial de 7 dias.</h1>
        <p class="mt-4 text-slate-300">Crie sua conta e tenha uma visão completa das oportunidades e da sua rotina comercial.</p>
      </div>
    </section>

    <section class="flex items-center justify-center p-6">
      <div class="w-full max-w-md rounded-2xl border border-white/10 bg-white/5 p-6 sm:p-8">
        <div class="flex items-center justify-between">
          <h2 class="text-2xl font-bold">Criar conta</h2>
          <a href="/" class="text-sm text-slate-300 hover:text-white">Voltar</a>
        </div>

        <form id="signup-form" class="mt-6 space-y-4">
          <div>
            <label for="name" class="block text-sm text-slate-300">Nome</label>
            <input id="name" type="text" required autocomplete="name" class="mt-1 w-full rounded-lg border border-white/15 bg-black/20 px-3 py-2.5 text-slate-100 focus:outline-none focus:ring-2 focus:ring-yellow-500" />
          </div>
          <div>
            <label for="email" class="block text-sm text-slate-300">Email</label>
            <input id="email" type="email" required autocomplete="email" class="mt-1 w-full rounded-lg border border-white/15 bg-black/20 px-3 py-2.5 text-slate-100 focus:outline-none focus:ring-2 focus:ring-yellow-500" />
          </div>
          <div>
            <label for="password" class="block text-sm text-slate-300">Senha</label>
            <input id="password" type="password" required minlength="8" autocomplete="new-password" class="mt-1 w-full rounded-lg border border-white/15 bg-black/20 px-3 py-2.5 text-slate-100 focus:outline-none focus:ring-2 focus:ring-yellow-500" />
          </div>
          <div>
            <label for="confirm" class="block text-sm text-slate-300">Confirmar senha</label>
            <input id="confirm" type="password" required minlength="8" autocomplete="new-password" class="mt-1 w-full rounded-lg border border-white/15 bg-black/20 px-3 py-2.5 text-slate-100 focus:outline-none focus:ring-2 focus:ring-yellow-500" />
          </div>
          <p class="text-xs text-slate-400">Ao criar sua conta, você inicia automaticamente o trial de 7 dias.</p>
          <button type="submit" class="w-full rounded-lg px-4 py-2.5 font-bold text-black bg-yellow-500 hover:bg-yellow-400">Criar conta</button>
        </form>

        <div class="mt-6">
          <div class="relative">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
            <div class="relative text-center text-xs text-slate-400"><span class="bg-slate-950 px-2">ou</span></div>
          </div>
          <button id="google-btn" class="mt-4 w-full rounded-lg border border-white/15 bg-white/5 px-4 py-2.5 font-semibold hover:bg-white/10">Cadastrar com Google</button>
        </div>

        <p id="success" class="mt-4 text-sm text-emerald-300"></p>
        <p id="error" class="mt-2 text-sm text-red-300"></p>

        <p class="mt-6 text-sm text-slate-300">Já tem conta? <a href="/login.html" class="text-yellow-300 hover:text-yellow-200 font-semibold">Entrar</a></p>
      </div>
    </section>
  </main>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDqRoRHQU-3XwUmNrV5MwVW6o_PwbxywVA",
      authDomain: "uniquex-487718.firebaseapp.com",
      projectId: "uniquex-487718",
      storageBucket: "uniquex-487718.firebasestorage.app",
      messagingSenderId: "1050359786854",
      appId: "1:1050359786854:web:6b9c09acbbd637ed5a6ca7"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    const form = document.getElementById('signup-form');
    const nameInput = document.getElementById('name');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirm');
    const googleBtn = document.getElementById('google-btn');
    const successEl = document.getElementById('success');
    const errorEl = document.getElementById('error');

    function clearMessages() { successEl.textContent = ''; errorEl.textContent = ''; }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessages();

      if (passwordInput.value !== confirmInput.value) {
        errorEl.textContent = 'As senhas não conferem.';
        return;
      }

      try {
        const credential = await auth.createUserWithEmailAndPassword(emailInput.value.trim(), passwordInput.value);
        if (credential.user && nameInput.value.trim()) {
          await credential.user.updateProfile({ displayName: nameInput.value.trim() });
        }
        window.location.href = '/radar';
      } catch (error) {
        errorEl.textContent = error.message || 'Falha ao criar conta.';
      }
    });

    googleBtn.addEventListener('click', async () => {
      clearMessages();
      try {
        await auth.signInWithPopup(provider);
        window.location.href = '/radar';
      } catch (error) {
        errorEl.textContent = error.message || 'Falha no cadastro com Google.';
      }
    });

    auth.onAuthStateChanged((user) => {
      if (user) {
        window.location.href = '/radar';
      }
    });
  </script>
</body>
</html>
